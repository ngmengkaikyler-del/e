<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Battle Cats - Cloud Player</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #game-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .footer {
            background: #222;
            color: #fff;
            text-align: center;
            padding: 10px;
            font-family: sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <iframe 
            src="https://now.gg" 
            allow="autoplay; gamepad; fullscreen; keyboard"
            scrolling="no">
        </iframe>
    </div>

    <div class="footer">
        If the screen stays black, <b>disable AdBlock</b> and refresh.
    </div>

</body>
</html>
