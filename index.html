<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Battle Cats iOS Cloud</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; }
        #game-frame { width: 100%; height: 100%; border: none; display: none; }
        #overlay { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: white; }
        button { padding: 15px 30px; font-size: 18px; background: #ffbd00; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; -webkit-appearance: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>The Battle Cats Cloud</h2>
        <p>iOS requires a tap to start</p>
        <button onclick="startGame()">▶ PLAY NOW</button>
    </div>

    <iframe id="game-frame" 
        src="https://now.gg" 
        allow="autoplay; fullscreen" 
        scrolling="no">
    </iframe>

    <script>
        function startGame() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('game-frame').style.display = 'block';
        }
    </script>
</body>
</html>
