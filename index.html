<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Battle Cats - Web Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }
        .game-container {
            width: 100%;
            max-width: 960px; /* Optimized for Battle Cats aspect ratio */
            aspect-ratio: 16 / 9;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Using TurboWarp for better performance and a cleaner look than Scratch -->
        <iframe 
            src="https://turbowarp.org" 
            allowtransparency="true" 
            allowfullscreen 
            scrolling="no">
        </iframe>
    </div>

</body>
</html>
