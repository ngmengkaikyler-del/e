<!DOCTYPE html>
<html>
<head>
    <title>Class Notes</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        input { padding: 10px; width: 300px; border: 1px solid #0f0; background: #000; color: #0f0; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #0f0; color: #000; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2>SECURE PROXY PORTAL</h2>
    <input type="text" id="urlInput" placeholder="Enter link (e.g. google.com)">
    <button onclick="launchProxy()">GO</button>

    <script>
        function launchProxy() {
            var destination = document.getElementById('urlInput').value;
            if (destination) {
                // Strips http/https if you added it, then wraps in Google Translate
                var cleanUrl = destination.replace(/^https?:\/\//, '');
                window.location.href = 'https://google.com' + cleanUrl;
            }
        }
    </script>
</body>
</html>
