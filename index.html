<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Work Project</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000; 
            overflow: hidden; 
        }
        /* This makes the game fill the iPad screen perfectly */
        iframe { 
            width: 100vw; 
            height: 100vh; 
            border: none; 
        }
    </style>
</head>
<body>

    <!-- Using the Forkphorus bridge to bypass domain filters -->
    <iframe 
        src="https://github.io" 
        allowfullscreen 
        allowtransparency="true"
        allow="autoplay; fullscreen">
    </iframe>

</body>
</html>
