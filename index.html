<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Battle Cats - Cloud</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
        /* The container helps hide the source from some simple blockers */
        #main-view { width: 100vw; height: 100vh; border: none; }
    </style>
</head>
<body>

    <!-- The 'sandbox' attribute helps prevent the ad-blocker from interfering with the frame's internal scripts -->
    <iframe 
        id="main-view"
        src="https://now.gg" 
        allow="autoplay; gamepad; fullscreen; keyboard; clipboard-read; clipboard-write"
        sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-popups-to-escape-sandbox allow-presentation allow-same-origin allow-scripts"
        scrolling="no">
    </iframe>

    <script>
        // Automatic refresh if the frame fails to load after 5 seconds
        setTimeout(function() {
            var ifr = document.getElementById('main-view');
            if(ifr.contentWindow.length === 0) {
                console.log("Attempting forced reload...");
                ifr.src = ifr.src; 
            }
        }, 5000);
    </script>

</body>
</html>
